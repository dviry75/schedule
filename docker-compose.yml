version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scheduler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    command: sh -c "npm run prisma:generate && npm run prisma:migrate && node dist/server.js"

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres
    command: sh -c "npm run prisma:generate && npm run prisma:migrate && node dist/workers/worker.js"

volumes:
  pgdata:
